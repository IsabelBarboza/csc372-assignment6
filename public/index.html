<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokebook</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>
<body>
    <h1>Random Jokebook</h1>
    <div id="random-joke"></div>

    <h2>Categories</h2>
    <div id="categories-container"></div>

    <h2>Search Category</h2>
    <input type="text" id="search-input">
    <button id="search-button">Search</button>

    <h2>Jokes</h2>
    <div id="jokes-container"></div>

    <h2>Add a Joke</h2>
        <form id="joke-form">
        
        <input type="text" placeholder="Category" name="category" id="category" required>
        <input type="text" placeholder="Setup" name="setup" id="setup" required>
        <input type="text" placeholder="Delivery" name="delivery" id="delivery" required>
        <button type="submit" >Add Joke</button>
    </form>
    
</body>
</html>
